<ActionBar title="PRAYER STREAKS" flat="true"></ActionBar>

<GridLayout rows="auto, auto, auto, *">
  <!-- Stats bar -->
  <GridLayout row="0" columns="*, 12, *" class="px-4 pt-4 mb-3">
    <StackLayout col="0"
      class="bg-brut-card dark:bg-[#1c1c1e] border-3 border-brut-ink dark:border-[#5a5c5b] rounded-xl neo-shadow p-4"
    >
      <Label text="CURRENT STREAK"
        class="font-bold text-brut-muted dark:text-[#9ca3af]"
        style="font-size: 9; letter-spacing: 0.1; text-transform: uppercase"
      ></Label>
      <StackLayout orientation="horizontal" class="mt-1">
        <Label
          [text]="checkinService.currentStreak()"
          class="font-bold text-brut-primary"
          style="font-size: 32; letter-spacing: -0.02"
        ></Label>
        <Label text="DAYS"
          class="font-bold text-brut-ink dark:text-[#e5e7eb] ml-1 mb-2"
          style="font-size: 11; letter-spacing: 0.05"
          verticalAlignment="bottom"
        ></Label>
      </StackLayout>
    </StackLayout>
    <StackLayout col="2"
      class="bg-brut-card dark:bg-[#1c1c1e] border-3 border-brut-ink dark:border-[#5a5c5b] rounded-xl neo-shadow p-4"
    >
      <Label text="LONGEST STREAK"
        class="font-bold text-brut-muted dark:text-[#9ca3af]"
        style="font-size: 9; letter-spacing: 0.1; text-transform: uppercase"
      ></Label>
      <StackLayout orientation="horizontal" class="mt-1">
        <Label
          [text]="checkinService.longestStreak()"
          class="font-bold text-brut-gold-dark dark:text-brut-gold"
          style="font-size: 32; letter-spacing: -0.02"
        ></Label>
        <Label text="DAYS"
          class="font-bold text-brut-ink dark:text-[#e5e7eb] ml-1 mb-2"
          style="font-size: 11; letter-spacing: 0.05"
          verticalAlignment="bottom"
        ></Label>
      </StackLayout>
    </StackLayout>
  </GridLayout>

  <!-- View toggle -->
  <StackLayout row="1"
    class="mx-4 mb-3 bg-brut-container dark:bg-[#2c2c2e] border-3 border-brut-ink dark:border-[#5a5c5b] rounded-full neo-shadow p-1"
  >
    <GridLayout columns="*, *, *">
      <Label col="0" text="YEAR"
        class="text-center py-2 rounded-full font-bold"
        style="font-size: 13; letter-spacing: 0.1"
        [color]="viewMode() === 'year' ? '#ecf3ff' : '#5a5c5b'"
        [backgroundColor]="viewMode() === 'year' ? '#005f99' : 'transparent'"
        [borderWidth]="viewMode() === 'year' ? 2 : 0"
        [borderColor]="viewMode() === 'year' ? '#2d2f2e' : 'transparent'"
        (tap)="setViewMode('year')"
      ></Label>
      <Label col="1" text="CALENDAR"
        class="text-center py-2 rounded-full font-bold"
        style="font-size: 13; letter-spacing: 0.1"
        [color]="viewMode() === 'calendar' ? '#ecf3ff' : '#5a5c5b'"
        [backgroundColor]="viewMode() === 'calendar' ? '#005f99' : 'transparent'"
        [borderWidth]="viewMode() === 'calendar' ? 2 : 0"
        [borderColor]="viewMode() === 'calendar' ? '#2d2f2e' : 'transparent'"
        (tap)="setViewMode('calendar')"
      ></Label>
      <Label col="2" text="LIST"
        class="text-center py-2 rounded-full font-bold"
        style="font-size: 13; letter-spacing: 0.1"
        [color]="viewMode() === 'list' ? '#ecf3ff' : '#5a5c5b'"
        [backgroundColor]="viewMode() === 'list' ? '#005f99' : 'transparent'"
        [borderWidth]="viewMode() === 'list' ? 2 : 0"
        [borderColor]="viewMode() === 'list' ? '#2d2f2e' : 'transparent'"
        (tap)="setViewMode('list')"
      ></Label>
    </GridLayout>
  </StackLayout>

  <!-- =============== LIST VIEW =============== -->
  @if (viewMode() === 'list') {
    <StackLayout row="2">
      <GridLayout columns="auto, *, auto"
        class="mx-4 mb-3 px-3 py-2 bg-brut-card dark:bg-[#1c1c1e] border-2 border-brut-ink dark:border-[#5a5c5b] rounded-xl"
      >
        <Image
          *ngIf="isIOS" col="0" src="sys://magnifyingglass" tintColor="#767776"
          width="18" height="18" verticalAlignment="center"
        ></Image>
        <Label
          *ngIf="!isIOS" col="0" [text]="searchIcon"
          class="material-icon text-brut-muted" style="font-size: 18" verticalAlignment="center"
        ></Label>
        <TextField col="1"
          [text]="searchQuery()" (textChange)="onSearchInput($event.value)"
          hint="Search journal entries..."
          class="text-sm ml-2 text-brut-ink dark:text-[#e5e7eb]"
          returnKeyType="search"
        ></TextField>
        @if (searchQuery()) {
          <Label col="2" text="Clear"
            class="text-sm text-brut-primary font-bold" verticalAlignment="center"
            (tap)="clearSearch()"
          ></Label>
        } @else if (hasJournalEntries()) {
          <GridLayout col="2" (tap)="onExportJournal()">
            <Image
              *ngIf="isIOS" src="sys://square.and.arrow.up" tintColor="#005f99"
              width="18" height="18" verticalAlignment="center"
            ></Image>
            <Label
              *ngIf="!isIOS" [text]="exportIcon"
              class="material-icon text-brut-primary" style="font-size: 18" verticalAlignment="center"
            ></Label>
          </GridLayout>
        }
      </GridLayout>
      <Label text="LAST 30 DAYS"
        class="font-bold text-brut-ink dark:text-[#e5e7eb] ml-4 mb-2"
        style="font-size: 18; letter-spacing: -0.02"
      ></Label>
    </StackLayout>

    <ListView row="3"
      [items]="historyItems()" separatorColor="transparent"
      class="mx-4 bg-brut-card dark:bg-[#1c1c1e] border-3 border-brut-ink dark:border-[#5a5c5b] rounded-xl neo-shadow"
    >
      <ng-template let-item="item">
        <StackLayout>
          <Label
            *ngIf="item.isMonthHeader" [text]="item.monthYear"
            class="font-bold text-brut-muted dark:text-[#9ca3af] p-2 px-4 mt-2"
            style="font-size: 10; letter-spacing: 0.15; text-transform: uppercase"
          ></Label>
          <StackLayout *ngIf="!item.isMonthHeader" (tap)="item.note ? toggleExpand(item.date) : null">
            <GridLayout columns="auto, auto, *, auto, auto"
              class="py-3 px-4"
              style="border-bottom-width: 1; border-bottom-color: #e7e8e6"
            >
              <Image
                *ngIf="isIOS" col="0"
                [src]="item.shielded ? 'sys://shield.fill' : item.checked ? 'sys://checkmark.circle.fill' : 'sys://xmark'"
                [tintColor]="item.shielded ? '#ffd709' : item.checked ? '#005f99' : '#b31b25'"
                width="20" height="20"
              ></Image>
              <Label
                *ngIf="!isIOS" col="0"
                [text]="item.shielded ? shieldIcon : item.checked ? checkIcon : closeIcon"
                class="material-icon" style="font-size: 20"
                [class.text-brut-primary]="item.checked && !item.shielded"
                [class.text-brut-error]="!item.checked && !item.shielded"
                [class.text-brut-gold]="item.shielded"
                width="24"
              ></Label>
              <Label col="1" [text]="item.displayDate"
                class="text-base font-bold ml-3 dark:text-[#e5e7eb]"
                [class.text-brut-ink]="item.checked"
                [class.text-brut-muted-light]="!item.checked"
              ></Label>
              <Label col="2" text=""></Label>
              <Label
                *ngIf="item.prayerType" col="3" [text]="item.prayerType"
                class="text-xs text-brut-ink-light dark:text-[#9ca3af] bg-brut-container dark:bg-[#2c2c2e] rounded-full px-2 py-1 font-bold"
              ></Label>
              <StackLayout *ngIf="item.note" col="4" class="ml-2" verticalAlignment="center">
                <Image
                  *ngIf="isIOS"
                  [src]="item.isExpanded ? 'sys://chevron.up' : 'sys://text.bubble'"
                  tintColor="#767776" width="16" height="16"
                ></Image>
                <Label
                  *ngIf="!isIOS"
                  [text]="item.isExpanded ? collapseIcon : noteIcon"
                  class="material-icon text-brut-muted" style="font-size: 16"
                ></Label>
              </StackLayout>
            </GridLayout>
            <WrapLayout *ngIf="item.slots && item.slots.length > 0" class="px-4 pt-1 pb-2 ml-8">
              <Label *ngFor="let sl of item.slots"
                [text]="sl.name"
                [class]="
                  'mr-1 mb-1 py-1 px-2 rounded text-xs font-bold border ' +
                  (sl.done
                    ? 'bg-brut-primary text-brut-on-primary border-brut-ink dark:border-[#5a5c5b]'
                    : 'bg-brut-container dark:bg-[#2c2c2e] text-brut-muted border-brut-muted-light dark:border-[#5a5c5b]')
                "
              ></Label>
            </WrapLayout>
            <StackLayout *ngIf="item.isExpanded && item.note" class="px-4 pb-3 pt-1 ml-8">
              <Label [text]="item.note" textWrap="true"
                class="text-sm text-brut-ink dark:text-[#e5e7eb] p-3 rounded-lg bg-brut-container-low dark:bg-[#2c2c2e] border-2 border-brut-ink dark:border-[#5a5c5b]"
                style="line-height: 5"
              ></Label>
            </StackLayout>
          </StackLayout>
        </StackLayout>
      </ng-template>
    </ListView>
  }

  <!-- =============== CALENDAR VIEW =============== -->
  @else if (viewMode() === 'calendar') {
    <GridLayout row="2" columns="auto, *, auto" class="mx-4 mb-2 px-2">
      <StackLayout col="0" (tap)="previousMonth()"
        class="border-3 border-brut-ink dark:border-[#5a5c5b] rounded-xl bg-brut-card dark:bg-[#1c1c1e] neo-shadow-sm"
        width="40" height="40" verticalAlignment="center"
      >
        <Image
          *ngIf="isIOS" src="sys://chevron.left" tintColor="#005f99"
          width="22" height="22" horizontalAlignment="center" verticalAlignment="center"
        ></Image>
        <Label
          *ngIf="!isIOS" [text]="prevIcon"
          class="material-icon text-brut-primary text-center" style="font-size: 22"
          horizontalAlignment="center" verticalAlignment="center"
        ></Label>
      </StackLayout>
      <Label col="1" [text]="currentMonthLabel()"
        class="text-center font-bold text-brut-ink dark:text-[#e5e7eb]"
        style="font-size: 20; letter-spacing: -0.02; text-transform: uppercase"
        verticalAlignment="center"
      ></Label>
      <StackLayout col="2" (tap)="nextMonth()"
        class="border-3 border-brut-ink dark:border-[#5a5c5b] rounded-xl bg-brut-card dark:bg-[#1c1c1e] neo-shadow-sm"
        width="40" height="40" verticalAlignment="center"
      >
        <Image
          *ngIf="isIOS" src="sys://chevron.right" tintColor="#005f99"
          width="22" height="22" horizontalAlignment="center" verticalAlignment="center"
        ></Image>
        <Label
          *ngIf="!isIOS" [text]="nextIcon"
          class="material-icon text-brut-primary text-center" style="font-size: 22"
          horizontalAlignment="center" verticalAlignment="center"
        ></Label>
      </StackLayout>
    </GridLayout>

    <ScrollView row="3">
      <StackLayout class="mx-4" (swipe)="onCalendarSwipe($event)">
        <GridLayout columns="*, *, *, *, *, *, *"
          [rows]="calendarRowDefs()"
          class="bg-brut-card dark:bg-[#1c1c1e] border-3 border-brut-ink dark:border-[#5a5c5b] rounded-xl neo-shadow p-3"
        >
          <Label row="0" col="0" text="SUN" class="text-center font-bold text-brut-muted" style="font-size: 9; letter-spacing: 0.05" verticalAlignment="center"></Label>
          <Label row="0" col="1" text="MON" class="text-center font-bold text-brut-muted" style="font-size: 9; letter-spacing: 0.05" verticalAlignment="center"></Label>
          <Label row="0" col="2" text="TUE" class="text-center font-bold text-brut-muted" style="font-size: 9; letter-spacing: 0.05" verticalAlignment="center"></Label>
          <Label row="0" col="3" text="WED" class="text-center font-bold text-brut-muted" style="font-size: 9; letter-spacing: 0.05" verticalAlignment="center"></Label>
          <Label row="0" col="4" text="THU" class="text-center font-bold text-brut-muted" style="font-size: 9; letter-spacing: 0.05" verticalAlignment="center"></Label>
          <Label row="0" col="5" text="FRI" class="text-center font-bold text-brut-muted" style="font-size: 9; letter-spacing: 0.05" verticalAlignment="center"></Label>
          <Label row="0" col="6" text="SAT" class="text-center font-bold text-brut-muted" style="font-size: 9; letter-spacing: 0.05" verticalAlignment="center"></Label>

          <Label *ngFor="let cell of flatCalendarCells()"
            [row]="cell.gridRow" [col]="cell.gridCol"
            [text]="cell.dayOfMonth"
            width="36" height="36"
            borderRadius="6"
            [backgroundColor]="getCellColor(cell)"
            [borderColor]="cell.isToday ? '#005f99' : (cell.isCurrentMonth ? '#2d2f2e' : 'transparent')"
            [borderWidth]="cell.isCurrentMonth ? 2 : 0"
            [color]="getCellTextColor(cell)"
            class="text-center text-xs font-bold"
            horizontalAlignment="center" verticalAlignment="center"
          ></Label>
        </GridLayout>

        <!-- Legend -->
        <StackLayout orientation="horizontal" class="mt-3 mb-4 px-2" horizontalAlignment="center">
          <StackLayout orientation="horizontal" class="mr-4">
            <StackLayout width="12" height="12" borderRadius="3" backgroundColor="#005f99" borderWidth="1" borderColor="#2d2f2e" verticalAlignment="center"></StackLayout>
            <Label text="PRAYED" class="font-bold text-brut-muted ml-1" style="font-size: 9; letter-spacing: 0.05" verticalAlignment="center"></Label>
          </StackLayout>
          <StackLayout orientation="horizontal" class="mr-4">
            <StackLayout width="12" height="12" borderRadius="3" backgroundColor="#63b4fd" borderWidth="1" borderColor="#2d2f2e" verticalAlignment="center"></StackLayout>
            <Label text="+ JOURNAL" class="font-bold text-brut-muted ml-1" style="font-size: 9; letter-spacing: 0.05" verticalAlignment="center"></Label>
          </StackLayout>
          <StackLayout orientation="horizontal">
            <StackLayout width="12" height="12" borderRadius="3" backgroundColor="#ffd709" borderWidth="1" borderColor="#2d2f2e" verticalAlignment="center"></StackLayout>
            <Label text="SHIELD" class="font-bold text-brut-muted ml-1" style="font-size: 9; letter-spacing: 0.05" verticalAlignment="center"></Label>
          </StackLayout>
        </StackLayout>
      </StackLayout>
    </ScrollView>
  }

  <!-- =============== YEAR VIEW =============== -->
  @else {
    <GridLayout row="2" columns="auto, *, auto" class="mx-4 mb-2 px-2">
      <StackLayout col="0" (tap)="previousYear()"
        class="border-3 border-brut-ink dark:border-[#5a5c5b] rounded-xl bg-brut-card dark:bg-[#1c1c1e] neo-shadow-sm"
        width="40" height="40" verticalAlignment="center"
      >
        <Image
          *ngIf="isIOS" src="sys://chevron.left" tintColor="#005f99"
          width="22" height="22" horizontalAlignment="center" verticalAlignment="center"
        ></Image>
        <Label
          *ngIf="!isIOS" [text]="prevIcon"
          class="material-icon text-brut-primary text-center" style="font-size: 22"
          horizontalAlignment="center" verticalAlignment="center"
        ></Label>
      </StackLayout>
      <Label col="1" [text]="calendarYear()"
        class="text-center font-bold text-brut-ink dark:text-[#e5e7eb]"
        style="font-size: 20; letter-spacing: -0.02"
        verticalAlignment="center"
      ></Label>
      <StackLayout col="2" (tap)="nextYear()"
        class="border-3 border-brut-ink dark:border-[#5a5c5b] rounded-xl bg-brut-card dark:bg-[#1c1c1e] neo-shadow-sm"
        width="40" height="40" verticalAlignment="center"
      >
        <Image
          *ngIf="isIOS" src="sys://chevron.right" tintColor="#005f99"
          width="22" height="22" horizontalAlignment="center" verticalAlignment="center"
        ></Image>
        <Label
          *ngIf="!isIOS" [text]="nextIcon"
          class="material-icon text-brut-primary text-center" style="font-size: 22"
          horizontalAlignment="center" verticalAlignment="center"
        ></Label>
      </StackLayout>
    </GridLayout>

    <ScrollView row="3" (swipe)="onYearSwipe($event)">
      <StackLayout class="mx-4 mb-4">
        <GridLayout columns="*, *, *" rows="auto, auto, auto, auto"
          class="bg-brut-card dark:bg-[#1c1c1e] border-3 border-brut-ink dark:border-[#5a5c5b] rounded-xl neo-shadow p-3"
        >
          <GridLayout *ngFor="let mm of yearMonths()"
            [row]="mm.gridRow" [col]="mm.gridCol"
            columns="*, *, *, *, *, *, *"
            [rows]="mm.miniRowDefs"
            class="p-2"
            verticalAlignment="top"
            (tap)="selectMonth(mm.monthIndex)"
          >
            <Label row="0" col="0" colSpan="7" [text]="mm.name"
              class="text-center font-bold text-brut-ink dark:text-[#e5e7eb]"
              style="font-size: 12; letter-spacing: 0.05; text-transform: uppercase"
            ></Label>
            <Label row="1" col="0" text="S" class="text-center text-brut-muted" style="font-size: 7"></Label>
            <Label row="1" col="1" text="M" class="text-center text-brut-muted" style="font-size: 7"></Label>
            <Label row="1" col="2" text="T" class="text-center text-brut-muted" style="font-size: 7"></Label>
            <Label row="1" col="3" text="W" class="text-center text-brut-muted" style="font-size: 7"></Label>
            <Label row="1" col="4" text="T" class="text-center text-brut-muted" style="font-size: 7"></Label>
            <Label row="1" col="5" text="F" class="text-center text-brut-muted" style="font-size: 7"></Label>
            <Label row="1" col="6" text="S" class="text-center text-brut-muted" style="font-size: 7"></Label>

            <Label *ngFor="let cell of mm.flatCells"
              [row]="cell.gridRow" [col]="cell.gridCol"
              text="" width="10" height="10"
              borderRadius="2"
              [backgroundColor]="getMiniCellColor(cell)"
              horizontalAlignment="center" verticalAlignment="center"
            ></Label>
          </GridLayout>
        </GridLayout>

        <!-- Legend -->
        <StackLayout orientation="horizontal" class="mt-3 px-2" horizontalAlignment="center">
          <StackLayout orientation="horizontal" class="mr-4">
            <StackLayout width="10" height="10" borderRadius="2" backgroundColor="#005f99" verticalAlignment="center"></StackLayout>
            <Label text="PRAYED" class="font-bold text-brut-muted ml-1" style="font-size: 9; letter-spacing: 0.05" verticalAlignment="center"></Label>
          </StackLayout>
          <StackLayout orientation="horizontal" class="mr-4">
            <StackLayout width="10" height="10" borderRadius="2" backgroundColor="#63b4fd" verticalAlignment="center"></StackLayout>
            <Label text="+ JOURNAL" class="font-bold text-brut-muted ml-1" style="font-size: 9; letter-spacing: 0.05" verticalAlignment="center"></Label>
          </StackLayout>
          <StackLayout orientation="horizontal">
            <StackLayout width="10" height="10" borderRadius="2" backgroundColor="#ffd709" verticalAlignment="center"></StackLayout>
            <Label text="SHIELD" class="font-bold text-brut-muted ml-1" style="font-size: 9; letter-spacing: 0.05" verticalAlignment="center"></Label>
          </StackLayout>
        </StackLayout>
      </StackLayout>
    </ScrollView>
  }
</GridLayout>
